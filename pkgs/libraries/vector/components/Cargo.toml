[package]
name = "vector_components"
version = "0.1.0"
edition = "2024"

[dependencies]
vector_config_macro = { path = "../../../macros/vector_config_macro" }
vector_runtime = { path = "../runtime" }
algorithm = { path = "../../algorithm" }
tokio = { version = "1.49.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0.149"
typetag = "0.2.21"
async-trait = "0.1.89"

# Future
futures = "0.3"
futures-util = "0.3"

# Websocket
tokio-tungstenite = { version = "0.28", features = ["rustls-tls-native-roots"] }

# Sea-orm
sea-orm = { version = "2.0.0-rc.31", features = [ "sqlx-mysql", "runtime-tokio-rustls", "macros" ], optional = true }

[features]
sea-orm = ["vector_config_macro/sea-orm", "dep:sea-orm"]
