[package]
name = "algorithm"
version = "0.1.0"
edition = "2024"

[dependencies]
bytes = "1.7"
log = "0.4.29"
parking_lot = "0.12.5"
dashmap = "6.1.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
utoipa = "5.4.0"
rand = "0.8.5"
aes-gcm = "0.10.3"
async-trait = "0.1.89"
thiserror = "2.0.18"
smallvec = { version = "1.15.2", features = ["union"] }
redis = { version = "1.0", features = ["tokio-comp"], optional = true }
tokio = { version = "1", features = ["sync"], optional = true }

[features]
redis = ["dep:redis", "dep:tokio"]

[dev-dependencies]
rand = "*"
rayon = "*"
core_affinity = "0.8.1"
tokio = { version = "1", features = ["rt", "macros"] }
