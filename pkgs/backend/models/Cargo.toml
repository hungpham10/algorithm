[package]
name = "models"
version = "0.1.0"
edition = "2024"

[lints.rust]
warnings = "deny"

[dependencies]
algorithm = { path = "../../libraries/algorithm" }
integration = { path = "../integration" }
schemas = { path = "../schemas" }

regex = "1.12.3"
rand = "0.8.5"
aes-gcm = "0.10.3"
url = "2.5.8"
chrono = "0.4.43"

serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"

utoipa = "5.4.0"
infisical = "0.0.3"
amqprs = "2.1.3"
async-trait = "0.1.89"
redis = { version = "1.0.3", features = ["tokio-comp", "connection-manager"] }
sea-orm = { version = "2.0.0-rc.31", features = [ "sqlx-mysql", "runtime-tokio-rustls", "macros" ] }
sea-schema = { version = "0.17.0-rc.5" }
sea-query = "1.0.0-rc.31"
aws-sdk-s3 = "1.122.0"
aws-config = "1.8.13"

[dev-dependencies]
criterion = { version = "0.5", features = ["async_tokio"] }
futures = "0.3.31"
tokio = { version = "1.49.0",  features = ["full"] }
dotenvy = "0.15.7"
