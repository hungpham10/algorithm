[package]
name = "services"
authors = ["Hung Pham"]
version = "0.1.0"
edition = "2024"

[package.metadata.deb]
maintainer = "Hung Pham <hung0913208@gmail.com>"
assets = [
    ["target/release/services", "/usr/bin/algorithm", "755"],
]

#[lints.rust]
#warnings = "deny"

[dependencies]
# Shared libraries
vector_runtime = { path = "../../libraries/vector/runtime" }
vector_components = { path = "../../libraries/vector/components" }
schemas = { path = "../schemas" }
models = { path = "../models" }
analysis = { path = "../../libraries/analysis" }
algorithm = { path = "../../libraries/algorithm" }
integration = { path = "../integration", features = ["vdsc"] }

# API
axum = { version = "0.8.8", features = ["macros", "multipart"] }
axum-macros = "0.5.0"
axum-extra = { version = "0.12.5", features = ["typed-header"] }
axum-prometheus = "0.10.0"
headers = "0.4.1"
http = "1.4.0"
http-body-util = "0.1.3"
hyper-util = { version = "0.1", features = ["tokio", "server-auto", "http1"] }
tokio = { version = "1.49.0", features = ["full"] }
tokio-util = "0.7.18"
sentry = { version = "0.46.2", features = ["tower-axum-matched-path"] }
tower = "0.5.3"
reqwest = "0.13.2"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
quick-xml = "0.39.2"
aws-sdk-s3 = "1.126.0"
utoipa = { version = "5.4.0", features = ["axum_extras"] }
utoipa-swagger-ui = { version = "9.0.2", features = ["axum", "vendored"], default-features = false }
rustls = { version = "0.23.36", features = ["ring"] }
futures = "0.3.32"
bytes = "1.11.1"
async-graphql = "7.2.1"
async-graphql-axum = "7.2.1"

# Investing
ta = "0.5.0"
stats = "*"
chrono = "*"
histogram = "*"

# Profiling
pprof = { version = "0.13", features = ["flamegraph", "protobuf-codec"] }
prost = "0.12"

# Subcommands
clap = { version = "4.5.57", features = ["derive"] }
log = "0.4.22"
dotenvy = "0.15.7"
env_logger = "0.11.8"
hex = "0.4.3"
hmac = "0.12.1"
sha2 = "0.10.9"
md-5 = "0.10.6"

tikv-jemallocator = "0.6"

[profile.release]
codegen-units = 1
lto = true
