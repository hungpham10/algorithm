[package]
name = "integration"
version = "0.1.0"
edition = "2024"

[dependencies]
# Macro
vector_config_macro = { path = "../../macros/vector_config_macro", features = ["sea-orm"] }

# Libraries
vector_components = { path = "../../libraries/vector/components", features = ["sea-orm"] }
vector_runtime = { path = "../../libraries/vector/runtime", features = ["sea-orm"] }
algorithm = { path = "../../libraries/algorithm" }
schemas = { path = "../schemas" }

# Helpers
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0.149"
reqwest = { version = "0.13.2", features = ["json"] }
reqwest-middleware = { version = "0.5.1", features = ["json"] }
reqwest-tracing = "0.7.0"
tokio = { version = "1.49.0",  features = ["full"] }
tokio-util = { version = "0.7.18", features = ["compat"] }
ssh2 = "0.9.5"
url = "2.5.8"
itertools = "0.14.0"
tracing = "0.1.44"

# Future
futures = "0.3"
futures-util = "0.3"

# Component
tokio-tungstenite = { version = "0.28", features = ["rustls-tls-native-roots"] }
typetag = "0.2.21"
ipnet = "2.10"
chrono = "0.4"
async-trait = "0.1.89"

[dev-dependencies]
criterion = { version = "0.5", features = ["async_tokio"] }
futures = "0.3.31"

[[bench]]
name = "ohlc_benchmark"
harness = false
