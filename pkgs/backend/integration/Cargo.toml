[package]
name = "integration"
version = "0.1.0"
edition = "2024"

[features]
default = ["tokio-tungstenite"]
vdsc = ["tokio-tungstenite"]
binance = ["tokio-tungstenite"]
kubernetes = ["dep:kube", "dep:k8s-openapi", "k8s-openapi/v1_31", "kube/runtime"]

[dependencies]
# Macro
vector_config_macro = { path = "../../macros/vector_config_macro" }

# Libraries
vector_runtime = { path = "../../libraries/vector/runtime" }
algorithm = { path = "../../libraries/algorithm" }
schemas = { path = "../schemas" }

# Helpers
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0.149"
reqwest = { version = "0.13.2", features = ["json"] }
tokio = { version = "1.49.0",  features = ["full"] }
tokio-util = { version = "0.7.18", features = ["compat"] }
ssh2 = "0.9.5"
url = "2.5.8"

# Future
futures = "0.3"
futures-util = "0.3"

# Component
tokio-tungstenite = { version = "0.28", features = ["rustls-tls-native-roots"], optional = true }
kube = { version = "0.96", features = ["client", "config"], optional = true }
k8s-openapi = { version = "0.23.0", features = ["v1_31"], optional = true }
typetag = "0.2.21"
ipnet = "2.10"
chrono = "0.4"
async-trait = "0.1.89"

[dev-dependencies]
criterion = { version = "0.5", features = ["async_tokio"] }
futures = "0.3.31"

[[bench]]
name = "ohlc_benchmark"
harness = false
