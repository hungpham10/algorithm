[package]
name = "vector_config_macro"
version = "0.1.0"
edition = "2024"

[lib]
proc-macro = true

[dependencies]
proc-macro2 = "1.0.106"
serde_derive_internals = "0.29"
quote = { version = "1.0", default-features = false }
syn = { version = "2.0", default-features = false, features = ["full", "extra-traits", "visit-mut", "visit", "proc-macro"] }


[dev-dependencies]
async-trait = "0.1.89"
typetag = "0.2.21"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0.149"
tokio = { version = "1.49.0",  features = ["full"] }
