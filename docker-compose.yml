version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: algorithm
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 512M
    develop:
      watch:
        - action: rebuild
          path: ./pkgs/backend
    volumes:
      - ./secrets:/app/secrets
    sysctls:
      - net.core.somaxconn=65535
      - net.ipv4.ip_local_port_range=1024 65535
    environment:
      - APP_ENV=dev
      - POSTGRES_PORT=5432
      - POSTGRES_USER=admin
      - POSTGRES_HOST=postgres
      - POSTGRES_DATABASE=default
      - POSTGRES_PASSWORD=rootroot
      - SOPS_AGE_KEY_CONTENT=${SOPS_AGE_KEY_CONTENT}
    depends_on:
      - valkey
      - mysql
      - postgres
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootroot
      MYSQL_DATABASE: default
      MYSQL_USER: admin
      MYSQL_PASSWORD: rootroot
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network

  postgres:
    image: postgres:16-alpine
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: rootroot
      POSTGRES_DB: default
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - app-network

  valkey:
    image: valkey/valkey:9.0-alpine
    command: valkey-server --requirepass rootroot
    container_name: valkey-cache
    restart: always
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 512M
    networks:
      - app-network
networks:
  app-network:
    driver: bridge

volumes:
  db_data:
  pg_data:
