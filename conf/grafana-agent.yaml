server:
  log_level: info

metrics:
  wal_directory: /tmp/wal
  global:
    scrape_interval: 15s
  configs:
    - name: app
      scrape_configs:
        - job_name: application
          static_configs:
            - targets: ['localhost:8080']
              labels:
                instance: rust-server
      remote_write:
        - url: https://prometheus-prod-18-prod-ap-southeast-0.grafana.net/api/prom/push
          basic_auth:
            username: ${GRAFANA_CLOUD_METRIC_ID}
            password: ${GRAFANA_CLOUD_METRIC_TOKEN}

traces:
  configs:
    - name: default
      remote_write:
        - endpoint: tempo-prod-07-prod-ap-southeast-0.grafana.net:443
          basic_auth:
            username: ${GRAFANA_CLOUD_TEMPO_ID}
            password: ${GRAFANA_CLOUD_TEMPO_TOKEN}
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: "localhost:4317"
            http:
              endpoint: "localhost:4318"
