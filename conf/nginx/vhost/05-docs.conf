location ~ ^/(docs|api-docs|swagger|apidocs) {
    if ($doc_type = 0) {
        return 404;
    }

    return 301 $scheme://$host/swagger-ui/;
}

location ^~ /swagger-ui {
    if ($doc_type = 0) {
        return 404;
    }

    proxy_pass http://backend;
    proxy_set_header Host $host;
    proxy_http_version 1.1;
}

location = /.well-known/openapi.json {
    rewrite ^ /docs/openapi.json last;
}

location = /docs/openapi.json {
    set $dynamic_path "";

    access_by_lua_block {
        local http = require("resty.http")
        local host = ngx.var.host
        local doc_type = ngx.var.doc_type

        local tenant_id = ngx.shared.tenant:get(host)
        if not tenant_id then
            local httpc = http.new()
            local ok, _ = httpc:connect("unix:/var/run/axum")
            if ok then
                local res, _ = httpc:request({
                    path = "/api/admin/v1/seo/tenant/" .. host .. "/id",
                    method = "GET",
                    headers = {
                        ["Host"] = host,
                        ["Connection"] = "Keep-Alive",
                    }
                })
                if res and res.status == 200 then
                    tenant_id = res:read_body()
                    ngx.shared.tenant:set(host, tenant_id, 600)
                end
                httpc:set_keepalive()
            end
        end
        ngx.req.set_header("X-Tenant-Id", tenant_id or "")

        if doc_type == "1" then
            ngx.var.dynamic_path = "/docs/openapi.json"
        else
            if tenant_id then
                ngx.var.dynamic_path = "/api/admin/v1/seo/files" .. ngx.var.request_uri
            else
                ngx.exit(404)
            end
        end
    }

    proxy_pass http://backend$dynamic_path;
    proxy_http_version 1.1;
    proxy_set_header Host $host;

    proxy_cache WEBSITE;
    proxy_cache_valid 200 1h;
    proxy_cache_key "$host$request_uri$http_x_tenant_id";
    add_header X-Cache-Status $upstream_cache_status;
}
