location /api/ {
    # --- Xử lý CORS OPTIONS ---
    if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' '$cors_origin' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Max-Age' 1728000 always;
        add_header 'Content-Type' 'text/plain; charset=utf-8';
        add_header 'Content-Length' 0;
        return 204;
    }

    access_by_lua_block {
        local openidc = require("resty.openidc")
        local http = require("resty.http")
        local jwks = require("resty.jwt-verification-jwks")
        local cjson = require("cjson")

        local host = ngx.var.host

        -----------------------------------------------------------------
        -- BƯỚC 1: GỌI ĐỘNG XUỐNG AXUM LẤY FULL CONFIG AUTH JSON
        -----------------------------------------------------------------
        -- Kiểm tra xem cấu hình auth của domain này đã có trong cache chưa
        local tenant_config_raw = ngx.shared.tenant:get("auth:" .. host)
        local tenant_config

        if not tenant_config_raw then
            local httpc = http.new()
            local ok, err = httpc:connect("unix:/var/run/axum")

            if ok then
                -- Gọi đúng endpoint Axum bạn vừa viết
                local res, _ = httpc:request({
                    path = "/api/admin/v1/seo/tenant/" .. host .. "/auth-config",
                    method = "GET",
                    headers = {
                        ["Host"] = host,
                        ["Connection"] = "Keep-Alive",
                    }
                })

                if res and res.status == 200 then
                    tenant_config_raw = res:read_body()
                    -- Cache lại cấu hình JSON này trong 10 phút (600 giây) để tối ưu hiệu năng
                    ngx.shared.tenant:set("auth:" .. host, tenant_config_raw, 600)
                end
                httpc:set_keepalive()
            end
        end

        -- Nếu vào trường hợp xấu nhất (Axum sập hoặc không tìm thấy config của domain này)
        if not tenant_config_raw then
            ngx.status = 500
            ngx.header["Content-Type"] = "application/json"
            return ngx.say(cjson.encode({ error = "Tenant auth configuration failed to load" }))
        end

        -- Parse chuỗi JSON nhận từ Axum thành table trong Lua
        tenant_config = cjson.decode(tenant_config_raw)

        -- Inject Tenant ID trực tiếp vào header cho backend xử lý dữ liệu cô lập
        ngx.req.set_header("X-Tenant-Id", tenant_config.auth.tenant_id or "")

        -----------------------------------------------------------------
        -- BƯỚC 2: KIỂM TRA JWT / AUTH (Bearer hoặc OIDC redirect)
        -----------------------------------------------------------------
        local auth_header = ngx.req.get_headers()["authorization"]

        if not auth_header and ngx.var.jwt_required == "2" then
            ngx.status = 401
            return ngx.say(cjson.encode({ error = "Unauthorized" }))
        end

        if auth_header then
            -------------------------------------------------------------
            -- TRƯỜNG HỢP: CÓ BEARER TOKEN (MOBILE / SPA APP)
            -------------------------------------------------------------
            local jwt_token = auth_header:gsub("Bearer%s+", "")
            local mode = tenant_config.auth.jwt_mode
            local jwt_obj, err

            if mode == "jwks" then
                -- Xác thực bất đối xứng qua JWKS URL (Auth0, Google...)
                local jwks_url = tenant_config.auth.oidc_jwks_url
                jwt_obj, err = jwks.verify_jwt_with_jwks(jwt_token, jwks_url)
            else
                -- Xác thực đối xứng qua Shared Secret (Mặc định Supabase - HS256)
                local jwt = require("resty.jwt")
                local secret = tenant_config.auth.jwt_secret
                jwt_obj = jwt:verify(secret, jwt_token)
                if not jwt_obj.verified then jwt_obj = nil end
            end

            if jwt_obj then
                ngx.req.set_header("X-User-Id", jwt_obj.payload.sub)
                ngx.req.set_header("X-Client-Id", jwt_obj.payload.azp or "")
                ngx.req.set_header("X-Audience-Id", jwt_obj.payload.aud or "")
            else
                ngx.status = 401
                return ngx.say(cjson.encode({ error = "Invalid Token", details = err }))
            end

        elseif ngx.var.jwt_required == "1" then
            -------------------------------------------------------------
            -- TRƯỜNG HỢP: FALBACK VỀ OPENID CONNECT (WEB COOKIE / SESSION)
            -------------------------------------------------------------
            local opts = {
                -- Nạp toàn bộ thông tin cấu hình động từ Axum JSON đưa sang
                discovery = tenant_config.auth.oidc_issuer .. "/.well-known/openid-configuration",
                client_id = tenant_config.auth.oidc_client_id,
                client_secret = tenant_config.auth.oidc_client_secret,
                redirect_uri = "https://" .. host .. "/callback",
                scope = "openid email profile",
                token_signing_alg_values_expected = { tenant_config.auth.oidc_expected_alg },
                ssl_verify = "yes",
                bearer_only = false,
                accept_none_alg = false,
                accept_unsupported_alg = false,

                -- Cô lập phân đoạn session cache trong Redis theo từng Tenant ID cụ thể
                cache_segment = 'oidc_cache_' .. tenant_config.auth.tenant_id,
                session_contents = {id_token=true, user=true, access_token=true}
            }

            local session_opts = {
                cookie_http_only = true,
                cookie_secure = true,
                cookie_same_site = "Lax",
                remember = true,
                secret = tenant_config.auth.session_secret, -- Đọc secret mã hóa cookie riêng của tenant
                storage = "redis",
                redis = {
                    host = os.getenv("REDIS_HOST"),
                    username = os.getenv("REDIS_USERNAME"),
                    password = os.getenv("REDIS_PASSWORD"),
                    port = tonumber(os.getenv("REDIS_PORT")),
                    db = 0,
                    connect_timeout = 500,
                    read_timeout = 2000,
                    send_timeout = 2000
                }
            }

            -- Thực hiện Authenticate OIDC
            local res, err, target, session = openidc.authenticate(opts, nil, nil, session_opts)

            if err then
                ngx.log(ngx.ERR, "OIDC authentication failed for " .. host .. ": " .. err)
                ngx.header["Content-Type"] = "application/json"
                ngx.status = ngx.HTTP_UNAUTHORIZED
                return ngx.say(cjson.encode({ error = "OIDC authentication failed: " .. err }))
            end

            if not res.id_token then
                if ngx.var.jwt_required == "2" then
                    ngx.status = 401
                    return ngx.say(cjson.encode({ error = "Missing Authorization" }))
                else
                    ngx.req.set_header("X-Is-Guest", "true")
                    return
                end
            end

            -- Validate tính hợp lệ của token dựa trên cấu hình tenant (Chống tấn công chéo token)
            if res.id_token.iss ~= tenant_config.auth.oidc_issuer and res.id_token.iss ~= tenant_config.auth.oidc_issuer .. "/" then
                ngx.status = 401
                return ngx.say(cjson.encode({ error = "Invalid token issuer" }))
            end

            if res.id_token.aud ~= tenant_config.auth.oidc_client_id then
                ngx.status = 401
                return ngx.say(cjson.encode({ error = "Invalid token audience" }))
            end

            -- Gán dữ liệu user thành công xuống backend
            ngx.req.set_header("X-User-Id", res.id_token.sub)
            if res.user and res.user.email then
                ngx.req.set_header("X-User-Email", res.user.email)
            end
        end
    }

    # --- Inject CORS và Chuyển tiếp Request xuống Axum backend ---
    add_header 'Access-Control-Allow-Origin' '$cors_origin' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With, X-Tenant-Id' always;
    add_header 'Access-Control-Allow-Credentials' 'true' always;

    proxy_pass http://backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
