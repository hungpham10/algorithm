# --- Healthcheck ---
location /health {
    proxy_pass http://backend/health;
    proxy_set_header Host $host;
    access_log off;
}

# --- Profiling ----
location /debug/pprof/profile {
    proxy_pass http://backend/debug/pprof/profile;
    proxy_set_header Host $host;
    access_log off;
