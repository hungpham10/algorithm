        local opts = {
            discovery = os.getenv("OIDC_ISSUER") .. "/.well-known/openid-configuration",
            client_id = os.getenv("OIDC_CLIENT_ID"),
            client_secret = os.getenv("OIDC_CLIENT_SECRET"),
            redirect_uri = "https://" .. ngx.var.host .. "/callback",
            scope = "openid email profile",
            token_signing_alg_values_expected = {"RS256"},
            ssl_verify = "yes",
            accept_none_alg = false,
            accept_unsupported_alg = false,
            cache_segment = 'auth0',
            session_contents = {id_token=true, user=true, access_token=true}
        }

        local session_opts = {
            cookie_http_only = true,
            cookie_secure = true,
            cookie_same_site = "Lax",
            remember = true,
            secret = os.getenv("OIDC_SESSION_SECRET"),
            storage = "redis",
            redis = {
                host = os.getenv("REDIS_HOST"),   -- hoặc hostname Redis
                username = os.getenv("REDIS_USERNAME"),
                password = os.getenv("REDIS_PASSWORD"),
                port = tonumber(os.getenv("REDIS_PORT")),
                db = 0,
                connect_timeout = 500,  -- ms
                read_timeout = 2000,    -- ms
                send_timeout = 2000     -- ms
            }
        }

        local res, err, target = openidc.authenticate(opts, nil, nil, session_opts)
        if err then
            ngx.log(ngx.ERR, "Callback authentication failed: " .. err)
            ngx.header["Content-Type"] = "application/json"
            ngx.status = ngx.HTTP_INTERNAL_SERVER_ERROR
            return ngx.say(cjson.encode({ error = "Callback authentication failed: " .. err }))
        end
        ngx.redirect(target or "/")
    }
}

# --- API Endpoints ---
location /api/ {
    access_by_lua_block {
        local http = require("resty.http")
        local cjson = require("cjson")
        local jwks = require("resty.jwt-verification-jwks")

        -- 1. Lấy tenant_id qua Unix Socket
        local tenant_id = ngx.shared.tenant:get(ngx.var.host)
        if not tenant_id then
            local httpc = http.new()
            local ok, err = httpc:connect("unix:/var/run/axum")
            if ok then
                local res, _ = httpc:request({
                    path = "/api/admin/v1/seo/tenant/" .. ngx.var.host .. "/id",
                    method = "GET",
                    headers = {
                        ["Host"] = ngx.var.host,
                        ["Connection"] = "Keep-Alive",
                    }
                })
                if res and res.status == 200 then
                    tenant_id = res:read_body()
                    ngx.shared.tenant:set(ngx.var.host, tenant_id, 600)
                end
                httpc:set_keepalive()
            end
        end
        ngx.req.set_header("X-Tenant-Id", tenant_id or "")

        -- 2. Kiểm tra JWT/Auth (Logic cũ của bạn)
        if ngx.var.jwt_required ~= "0" then
            local auth_header = ngx.req.get_headers()["authorization"]
            if not auth_header and ngx.var.jwt_required == "2" then
                ngx.status = 401
                return ngx.say(cjson.encode({ error = "Unauthorized" }))
            end

            if auth_header then
                local jwt_token = auth_header:gsub("Bearer%s+", "")
                local mode = os.getenv("JWT_MODE")
                local jwt_obj, err

                if mode == "jwks" then
                    -- Dành cho Firebase, Auth0, Google
                    local jwks_url = os.getenv("OIDC_JWKS_URL")
                    jwt_obj, err = jwks.verify_jwt_with_jwks(jwt_token, jwks_url)
                else
                    -- Dành cho Supabase hoặc các Provider dùng Shared Secret (HS256)
                    local jwt = require("resty.jwt")
                    local secret = os.getenv("JWT_SECRET")
                    jwt_obj = jwt:verify(secret, jwt_token)
                    if not jwt_obj.verified then jwt_obj = nil end
                end

                if jwt_obj then
                    ngx.req.set_header("X-User-Id", jwt_obj.payload.sub)
                else
                    ngx.status = 401
                    return ngx.say(cjson.encode({ error = "Invalid Token" }))
                end
	else
                -- === Falback về openid connect ===
                local opts = {
                    discovery = os.getenv("OIDC_ISSUER") .. "/.well-known/openid-configuration",  -- e.g., https://your-domain.auth0.com/.well-known/openid-configuration
                    client_id = os.getenv("OIDC_CLIENT_ID"),
                    client_secret = os.getenv("OIDC_CLIENT_SECRET"),
                    redirect_uri = "https://" .. ngx.var.host .. "/callback",  -- Cấu hình callback URL trong Auth0
                    scope = "openid email profile",
                    token_signing_alg_values_expected = {"RS256"},  -- Expect RS256 cho JWT verification (Auth0 default)
                    ssl_verify = "yes",
                    bearer_only = true,
                    accept_none_alg = false,
                    accept_unsupported_alg = false,
                    cache_segment = 'auth0',  -- Cache riêng cho location này
                    session_contents = {id_token=true, user=true, access_token=true}
                }

                local session_opts = {
                    cookie_http_only = true,
                    cookie_secure = true,
                    cookie_same_site = "Lax",
                    remember = true,
                    secret = os.getenv("OIDC_SESSION_SECRET"),  -- Secret cho session cookie
                    storage = "redis",
                    redis = {
                        host = os.getenv("REDIS_HOST"),   -- hoặc hostname Redis
                        username = os.getenv("REDIS_USERNAME"),
                        password = os.getenv("REDIS_PASSWORD"),
                        port = tonumber(os.getenv("REDIS_PORT")),
                        db = 0,
                        connect_timeout = 500,  -- ms
                        read_timeout = 2000,    -- ms
                        send_timeout = 2000     -- ms
                    }
                }

                -- Gọi authenticate cho OIDC
                local res, err, target, session = openidc.authenticate(opts, nil, nil, session_opts)

                if err then
                    ngx.log(ngx.ERR, "OIDC authentication failed: " .. err)
                    ngx.header["Content-Type"] = "application/json"
                    ngx.status = ngx.HTTP_UNAUTHORIZED
                    return ngx.say(cjson.encode({
                        error = "OIDC authentication failed: " .. err
                    }))
                end

                -- Xử lý nếu không có id_token (unauthenticated)
                if not res.id_token then
                    if ngx.var.jwt_required == "2" then
                        ngx.log(ngx.WARN, "Missing authorization for strict required request from " .. ngx.var.remote_addr)
                        ngx.header["Content-Type"] = "application/json"
                        ngx.status = ngx.HTTP_UNAUTHORIZED
                        return ngx.say(cjson.encode({
                            error = "Missing Authorization for request from " .. ngx.var.remote_addr
                        }))
                    else
                        -- Xử lý guest
                        ngx.req.set_header("X-Is-Guest", "true")
                        return
                    end
                end

                -- Kiểm tra issuer và audience để tăng bảo mật
                if res.id_token.iss ~= os.getenv("OIDC_ISSUER") .. "/" then
                    ngx.log(ngx.ERR, "Invalid issuer in token")
                    ngx.header["Content-Type"] = "application/json"
                    ngx.status = ngx.HTTP_UNAUTHORIZED
                    return ngx.say(cjson.encode({
                        error = "Invalid issuer (" .. res.id_token.iss .. " != " ..  os.getenv("OIDC_ISSUER") .. ")"
                    }))
                end
                if res.id_token.aud ~= os.getenv("OIDC_CLIENT_ID") then  -- Hoặc audience tùy chỉnh
                    ngx.log(ngx.ERR, "Invalid audience in token")
                    ngx.header["Content-Type"] = "application/json"
                    ngx.status = ngx.HTTP_UNAUTHORIZED
                    return ngx.say(cjson.encode({
                        error = "Invalid audience (" .. res.id_token.aud .. " != " .. os.getenv("OIDC_CLIENT_ID") .. ")"
                    }))
                end

                -- Set headers từ token
                ngx.req.set_header("X-User-Id", res.id_token.sub)
                if res.user and res.user.email then
                    ngx.req.set_header("X-User-Email", res.user.email)
                end
            end
        end
    }

    proxy_pass http://backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# --- Static website (Index) ---
location = / {
    access_by_lua_block {
        local http = require("resty.http")
        local tenant_id = ngx.shared.tenant:get(ngx.var.host)
        if not tenant_id then
            local httpc = http.new()
            local ok, _ = httpc:connect("unix:/var/run/axum")
            if ok then
                local res, _ = httpc:request({
                    path = "/api/admin/v1/seo/tenant/" .. ngx.var.host .. "/id",
                    method = "GET",
                    headers = {
                        ["Host"] = ngx.var.host,
                        ["Connection"] = "Keep-Alive",
                    }
                })

                if res and res.status == 200 then
                    tenant_id = res:read_body()
                    ngx.shared.tenant:set(ngx.var.host, tenant_id, 600)
                end
                httpc:set_keepalive()
            end
        end
        ngx.req.set_header("X-Tenant-Id", tenant_id or "")
    }

    proxy_pass http://backend/api/admin/v1/seo/files/index.html;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_cache WEBSITE;
    proxy_cache_valid 200 30d;
    proxy_cache_bypass $skip_cache $cache_bypass;
    add_header X-Cache-Status $upstream_cache_status;
    add_header Content-Type "text/html";
}

# --- Assets (JSON, Images, CSS, JS, WASM) ---
location ~* \.(?:json|jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg|eot|otf|zip|pdf|docx|html|wasm?)$ {
    access_by_lua_block {
        local http = require("resty.http")
        local tenant_id = ngx.shared.tenant:get(ngx.var.host)
        if not tenant_id then
            local httpc = http.new()
            local ok, _ = httpc:connect("unix:/var/run/axum")
            if ok then
                local res, _ = httpc:request({
                    path = "/api/admin/v1/seo/tenant/" .. ngx.var.host .. "/id",
                    method = "GET",
                    headers = {
                        ["Host"] = ngx.var.host,
                        ["Connection"] = "Keep-Alive",
                    }
                })
                if res and res.status == 200 then
                    tenant_id = res:read_body()
                    ngx.shared.tenant:set(ngx.var.host, tenant_id, 600)
                end
                httpc:set_keepalive()
            end
        end
        ngx.req.set_header("X-Tenant-Id", tenant_id or "")
    }

    proxy_pass http://backend/api/admin/v1/seo/files$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_cache WEBSITE;
    proxy_cache_valid 200 30d;
    expires 30d;
    add_header X-Cache-Status $upstream_cache_status;
    # Biến $s3_content_type này bạn cần định nghĩa lại bằng map if/set nếu cần
    # hoặc để Rust tự trả về Content-Type chuẩn qua socket.
}

# --- Sitemap & Robots ---
location ~* ^/(robots\.txt|sitemap-index\.xml|news_sitemap\.xml)$ {
    access_by_lua_block {
        local http = require("resty.http")
        local tenant_id = ngx.shared.tenant:get(ngx.var.host)
        if not tenant_id then
            local httpc = http.new()
            local ok, _ = httpc:connect("unix:/var/run/axum")
            if ok then
                local res, _ = httpc:request({
                    path = "/api/admin/v1/seo/tenant/" .. ngx.var.host .. "/id",
                    method = "GET",
                    headers = {
                        ["Host"] = ngx.var.host,
                        ["Connection"] = "Keep-Alive",
                    }
                })
                if res and res.status == 200 then
                    tenant_id = res:read_body()
                    ngx.shared.tenant:set(ngx.var.host, tenant_id, 600)
                end
                httpc:set_keepalive()
            end
        end
    }

    # Mapping path sitemap tùy theo uri
    set $sitemap_path "/api/admin/v1/seo/sitemap";
    if ($uri = "/robots.txt") { set $sitemap_path "/api/admin/v1/seo/files/robots.txt"; }
    if ($uri = "/news_sitemap.xml") { set $sitemap_path "/api/admin/v1/seo/news"; }

    proxy_pass http://backend$sitemap_path;
    proxy_set_header Host $host;
}

location ~ /\.ht { deny all; }
