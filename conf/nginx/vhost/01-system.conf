location /health {
    proxy_pass http://backend/health;
    proxy_set_header Host $host;
    access_log off;
}

location /metrics {
    proxy_pass http://backend/metrics;
    proxy_set_header Host $host;
    access_log off;
}

location /debug/pprof/profile {
    proxy_pass http://backend/debug/pprof/profile;
    proxy_set_header Host $host;
    access_log off;
}

location ~ /\.ht { deny all; }
