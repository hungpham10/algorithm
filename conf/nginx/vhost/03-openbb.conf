
location = /widgets.json {
    # 1. Define Header CORS
    add_header 'Access-Control-Allow-Origin' $cors_widgets_allowed_origin always;
    add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'X-Tenant-Id, Content-Type, Authorization' always;

    # 2. Preflight request
    if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' "$cors_widgets_allowed_origin" always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'X-Tenant-Id, Content-Type, Authorization' always;
        add_header 'Content-Length' 0;
        add_header 'Content-Type' 'text/plain; charset=utf-8';
        return 204;
    }

    access_by_lua_block {
        local http = require("resty.http")
        local tenant_id = ngx.shared.tenant:get(ngx.var.host)
        if not tenant_id then
            local httpc = http.new()
            local ok, _ = httpc:connect("unix:/var/run/axum")
            if ok then
                local res, _ = httpc:request({
                    path = "/api/admin/v1/seo/tenant/" .. ngx.var.host .. "/id",
                    method = "GET",
                    headers = {
                        ["Host"] = ngx.var.host,
                        ["Connection"] = "Keep-Alive",
                    }
                })
                if res and res.status == 200 then
                    tenant_id = res:read_body()
                    ngx.shared.tenant:set(ngx.var.host, tenant_id, 600)
                end
                httpc:set_keepalive()
            end
        end
        ngx.req.set_header("X-Tenant-Id", tenant_id or "")
    }

    proxy_pass http://backend/api/admin/v1/seo/files$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_cache WEBSITE;
    proxy_cache_valid 200 30d;
    expires 30d;
    add_header X-Cache-Status $upstream_cache_status;
    # Biến $s3_content_type này bạn cần định nghĩa lại bằng map if/set nếu cần
    # hoặc để Rust tự trả về Content-Type chuẩn qua socket.
}
