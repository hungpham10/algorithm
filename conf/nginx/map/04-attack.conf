
# --- 1. Bộ lọc xác định có chặn hay không ---
map "${environment}:${http_cf_ray}:${request_uri}" $is_attack {
    ~^dev:                                 "";
    ~^prod:[^:]+:.+                        "";
    ~^prod::/debug/pprof/profile$          "";
    ~^prod::/health$                       "";
    ~^prod::/metrics$                      "";

    # Mặc định: Chặn tất cả các trường hợp khác trên Prod
    default                                "1";
}

# --- 2. Bộ lọc trả về lý do chặn chi tiết tương ứng ---
map "${environment}:${http_cf_ray}:${request_uri}" $block_reason {
    # Các trường hợp hợp lệ (Không bị chặn) -> Trả về chuỗi rỗng
    ~^dev:                                 "";
    ~^prod:[^:]+:.+                        "";
    ~^prod::/debug/pprof/profile$          "";
    ~^prod::/health$                       "";
    ~^prod::/metrics$                      "";

    # CÁC TRƯỜNG HỢP BỊ CHẶN TRÊN PROD:
    # Trường hợp 1: Không có CF-Ray và cố tình truy cập vào trang chủ hoặc API khác trái phép
    ~^prod::/                              "Direct IP access detected (Missing Cloudflare Ray ID) on a protected endpoint.";

    # Mặc định cho tất cả các trường hợp bị chặn còn lại trên Prod
    default                                "Request blocked. Does not match security policy.";
}
