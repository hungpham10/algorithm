
map $uri $jwt_required {
    ~^/api/debug/                       0;
    ~^/api/investing/v1/ohcl/           0;
    ~^/api/investing/v2/                0;
    ~^/api/chat/v1/facebook/webhook     0;
    ~^/api/chat/v1/slack/webhook        0;
    ~^/api/ecommerce/v1/wms/shelves     1;
    default                             2;
}

# Map Domain sang Tenant ID (Để gửi header xuống backend)
map $host $tenant_id_map {
    hostnames;
    default                  "default_tenant";
    tenant1.com              "tenant_supabase_01";
    tenant2.vn               "tenant_auth0_02";
}

# Map chế độ check JWT (jwks hoặc secret)
map $host $oidc_jwt_mode {
    hostnames;
    default                  "secret";
    tenant1.com              "secret"; # Supabase
    tenant2.vn               "jwks";   # Auth0 / Google
}

# Map Issuer OIDC Endpoint
map $host $oidc_issuer_map {
    hostnames;
    default                  "https://your-default-idp.com";
    lighttrading.pp.ua       "https://xyz-project-id.supabase.co/auth/v1";
    lazycatpetshop.pp.ua     "https://your-tenant.us.auth0.com";
}

# Map Client ID
map $host $oidc_client_id_map {
    hostnames;
    default                  "default-client-id";
    tenant1.com              "supabase-anon-key-or-client-id";
    tenant2.vn               "auth0-client-id-xyz";
}

# Map Client Secret / JWT Secret
map $host $oidc_secret_map {
    hostnames;
    default                  "default-very-long-secret-key";
    tenant1.com              "supabase-jwt-secret-for-hs256";
    tenant2.vn               "auth0-client-secret-if-applicable";
}

# Map JWKS URL (Chỉ dùng khi oidc_jwt_mode là 'jwks')
map $host $oidc_jwks_url_map {
    hostnames;
    default                  "https://your-default-idp.com/.well-known/jwks.json";
    tenant1.com              ""; # Supabase dùng đối xứng không cần jwks
    tenant2.vn               "https://your-tenant.us.auth0.com/.well-known/jwks.json";
}

# Map thuật toán ký (Supabase = HS256, Auth0/Google/Firebase = RS256)
map $host $oidc_alg_map {
    hostnames;
    default                  "RS256";
    tenant1.com              "HS256";
    tenant2.vn               "RS256";
}

# Map khóa mã hóa Session Cookie (Mỗi domain 1 chuỗi ngẫu nhiên >= 32 ký tự)
map $host $oidc_session_secret_map {
    hostnames;
    default                  "default_session_secret_32_characters_long";
    tenant1.com              "session_secret_for_tenant_1_32_chars";
    tenant2.vn               "session_secret_for_tenant_2_32_chars";
}
