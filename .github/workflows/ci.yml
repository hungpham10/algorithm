name: CI/CD

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: 'stable'

  INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_PROJECT_ID }}
  INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
  INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}

on:
  push:
    branches: ["feat/**", "main"]
    tags: ['v*.*.*', '*.*.*']
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy

      # 1. Tối ưu Cache cho Rust
      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Run Linters
        run: |
          make setup
          make lint

  benchmark:
    name: Benchmark Code
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      # 2. Tối ưu Cache cho Benchmark
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          # Thêm prefix riêng để tránh xung đột cache với job lint/test
          shared-key: "benchmark"

      - name: Run benchmark
        run: cargo bench --workspace --exclude proxy | tee benchmark_result.txt

  test:
    name: Test Suite
    runs-on: ubuntu-22.04
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 'rootroot'
          MYSQL_DATABASE: test
        ports: ["3306:3306"]
        options: --health-cmd "mysqladmin ping" --health-interval 10s --health-timeout 5s --health-retries 3
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 3
    env:
      ENVIRONMENT: dev
      MYSQL_DSN: mysql://root:rootroot@127.0.0.1:3306/test
      REDIS_DSN: redis://127.0.0.1:6379
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      # 3. Tối ưu Cache cho Test
      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Setup Database
        run: ./scripts/dataload.sh "mysql" ./sql

      - name: Run Tests
        run: |
          make setup
          make test

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Nginx Config Check
        run: docker run --rm -v ${{ github.workspace }}/nginx.conf:/etc/nginx/nginx.conf:ro nginx nginx -t

  build_docker_image:
    name: Build & Push Docker
    runs-on: ubuntu-22.04
    needs:
      - test
      - validate
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Tối ưu Cache cho Docker (Build layers)
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
